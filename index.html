<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soft Blonde Snack</title>
 
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192x192.png">
  <link rel="manifest" href="site.webmanifest">

  <style>
    :root { --bg: #f8f8f8; --text: #333; --secondary: #555; }
    [data-theme="dark"] { --bg: #1a1a1a; --text: #e0e0e0; --secondary: #aaa; }

        /* Styling the scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }
    
    ::-webkit-scrollbar-track {
      background: var(--bg);
    }
    
    ::-webkit-scrollbar-thumb {
      background: #f4d03f; /* Using your Soft Gold! */
      border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #ff69b4; /* Flashes Pink on hover */
    }
    
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      text-align: center;
      transition: background 0.3s, color 0.3s;
    }

/* 1. MAIN HERO SETTINGS (Desktop & General) */
.hero {
  position: relative;
  margin: -20px -20px 40px -20px;
  height: 65vh;
  min-height: 450px;
  
  /* Background setup with Parallax */
  background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)), 
              url('https://pub-a61f2b08e4414067ba6d337c905d46c2.r2.dev/site-assets/IMG_2863.JPEG');
  background-position: center 30%;
  background-size: cover;
  background-repeat: no-repeat;
  background-attachment: fixed; /* THE PARALLAX LINE */

  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding-left: 10%;
  color: white;
  text-shadow: 0 3px 12px rgba(0,0,0,0.85);
  transition: height 0.3s ease;
}

/* This block handles the text alignment for desktop */
.hero-content {
  text-align: left;
  max-width: 460px;
  color: #f4d03f; /* Your Soft Gold */
  
  /* Nudging it up and to the right over the pillow */
  margin-left: 60px; 
  margin-bottom: 60px; 
}

/* 2. MOBILE OVERRIDES (Screens smaller than 768px) */
@media (max-width: 768px) {
  .hero {
    background-attachment: scroll; /* Disables parallax for mobile stability */
    background-position: 80% 15%; 
    height: 45vh;
    justify-content: center;
    padding-left: 0;
  }
  .hero-content {
    margin: 0; /* Reset margins for mobile centering */
    text-align: center;
  }

  .hero h1 {
    font-size: 2.4em;
  }
}

    .main-header { font-size: 2.4em; margin: 40px 0 30px 0; color: var(--text); }

/* Container for the Title and the Buttons */
.section-header-wrapper {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap; /* Allows buttons to move below the title if space runs out */
  gap: 15px;
  max-width: 1600px;
  margin: 30px auto 25px;
  padding: 0 20px;
}

.section-header { 
  font-size: 2.0em; 
  margin: 0; 
  color: var(--secondary); 
}

/* The Menu containing the two buttons */
.jump-menu {
  display: flex;
  gap: 10px; /* Precise spacing between buttons */
}

.jump-menu a {
  padding: 8px 20px;
  background: #ff69b4;
  color: white;
  border-radius: 50px; /* Makes them perfect pills */
  text-decoration: none;
  font-weight: bold;
  font-size: 0.9em;
  white-space: nowrap; /* Keeps "Images" on one line */
  transition: opacity 0.2s, transform 0.1s;
  box-shadow: 0 2px 8px rgba(255, 105, 180, 0.3);
}

.jump-menu a:active {
  transform: scale(0.95);
}

/* Mobile Fix: Center the headers and buttons when they stack */
@media (max-width: 600px) {
  .section-header-wrapper {
    justify-content: center;
    text-align: center;
  }
  
  .section-header {
    width: 100%; /* Forces the buttons to the next line */
    font-size: 1.8em;
  }

  .jump-menu a {
    padding: 6px 16px;
    font-size: 0.85em;
  }
}

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      max-width: 1600px;
      margin: 0 auto 80px;
      overflow: hidden; /* Safety net for container blowout */
    }

/* Carousel Item - Updated for consistent sizing */
    .carousel-item {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      
      aspect-ratio: 2 / 3; 
      height: 100%;        
    }

    .carousel { 
      position: relative; 
      height: 100%; /* Ensure the inner carousel fills the item container */
    }

    .carousel img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* This ensures images fill the box without distorting */
      display: none;
      cursor: pointer;
    }
    
    .carousel img.active { display: block; }
    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.5em;
      cursor: pointer;
      z-index: 10;
    }
    .carousel-btn.prev { left: 12px; }
    .carousel-btn.next { right: 12px; }
    .carousel-dots {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    .carousel-dots span {
      width: 9px;
      height: 9px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      cursor: pointer;
    }
    .carousel-dots span.active {
      background: white;
      transform: scale(1.2);
    }

    /* Regular Items */
    .item {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: box-shadow 0.3s ease;
      aspect-ratio: 2 / 3;
    }

    .item:hover {
      box-shadow: 0 10px 25px rgba(0,0,0,0.3); /* Adds a deeper shadow on hover */
    }
    
.item img {
      width: 100%;       /* Forces image to fit container width */
      height: 100%;      /* Forces image to fit container height */
      object-fit: cover; /* Prevents squishing/stretching */
      display: block;
      transition: transform 0.5s ease;
    }

    .item:hover img {
      transform: scale(1.05); /* Slight zoom in */
    }

      /* Precise control for Video scaling */
      .item video {
        width: 100%;           /* Fit the box width */
        height: 100%;          /* Fit the box height */
        max-height: 100%;      /* CRITICAL: Prevents running off top/bottom */
        object-fit: contain;   /* Shows the full video frame without cropping */
        background: #000;      /* Adds black bars if the video doesn't perfectly fit the box */
        display: block;
        border-radius: 12px;
      }

    .caption {
      position: absolute;
      top: 0; left: 0; right: 0;
      
      /* Modern Glassmorphism Effect */
      background: rgba(0, 0, 0, 0.45);        /* semi-transparent dark background */
      backdrop-filter: blur(10px);           /* blurs the image behind the text */
      -webkit-backdrop-filter: blur(10px);    /* support for Safari browsers */
      
      /* Subtle border to make it pop */
      border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
      
      color: white;
      padding: 15px 15px 20px;
      font-size: 1.05em;
      text-align: center;
      z-index: 5;
    }

      .badge-new {
        position: absolute;
        top: 10px;
        right: 10px;
        background: #ff69b4; /* Your signature pink */
        color: white;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 0.7em;
        font-weight: bold;
        z-index: 10;
        text-transform: uppercase;
      }

    #lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #lightbox img {
      max-width: 95%;
      max-height: 95vh;
      border-radius: 8px;
    }

    .back-to-top {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: rgba(0,0,0,0.75);
      color: white;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 1.8em;
      z-index: 200;
      cursor: pointer;
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      font-size: 1.8em;
      cursor: pointer;
      z-index: 100;
    }
      
/* Social Links Styling */
.social-links {
  position: absolute;
  bottom: 25px;         /* 25px up from the bottom of the banner */
  left: 30px;           /* 30px in from the left */
  display: flex;
  gap: 18px;
  z-index: 20;          /* Ensures icons stay on top of the background */
}

.social-links a {
  display: flex;
  transition: transform 0.2s ease-in-out;
}

/* Hover effect for desktop */
.social-links a:hover {
  transform: scale(1.2);
}

/* Icon color/filter - optional if your SVGs aren't already the right color */
.social-links img {
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}

/* Mobile Adjustments */
@media (max-width: 768px) {
  .social-links {
    bottom: 20px;       /* Slightly tighter to the corner on mobile */
    left: 20px;
    gap: 15px;
  }
  
  .social-links img {
    width: 24px;        /* Slightly smaller icons for smaller screens */
    height: 24px;
  }
}
  </style>
</head>
<body>
  <button class="theme-toggle" id="theme-toggle">🌙</button>
     
  <div class="hero">
    <div class="social-links">
     <a href="https://instagram.com/softblondesnack" target="_blank">
       <img src="instagram.svg" width="28" height="28" alt="Instagram">
     </a>
     <a href="https://x.com/softblondesnack" target="_blank">
       <img src="xlogo.svg" width="28" height="28" alt="X">
     </a>
     <a href="https://onlyfans.com/softblondesnack" target="_blank">
       <img src="onlyfans.svg" width="28" height="28" alt="OnlyFans">
     </a>
   </div>
    
    <div class="hero-content">
      <h1>Smart.<br>Sassy.</h1>
      <p>Sincerely Me.</p>
    </div>
  </div>

  <h2 class="main-header">Media Gallery</h2>

  <div class="section-header-wrapper" id="images">
    <h3 class="section-header">Images</h3>
    <div class="jump-menu">
      <a href="#images">Images</a>
      <a href="#videos">Videos</a>
    </div>
  </div>

  <div class="gallery" id="gallery"></div>

  <div class="section-header-wrapper" id="videos">
    <h3 class="section-header">Videos</h3>
    <div class="jump-menu">
      <a href="#images">Images</a>
      <a href="#videos">Videos</a>
    </div>
  </div>

  <div class="gallery" id="video-gallery"></div>

  <p>More coming soon...</p>

  <div class="back-to-top" id="back-to-top">↑</div>

  <div id="lightbox">
    <img id="lightbox-image" src="" alt="">
  </div>

  <script>
    const bucketUrl = "https://pub-a61f2b08e4414067ba6d337c905d46c2.r2.dev/";
    const workerUrl = "https://sparkling-rain-18fb.amandabennett-hbg.workers.dev/list";
    const captionsUrl = "captions.json";

    async function loadMedia() {
      let captions = {};
      try {
        const res = await fetch(captionsUrl);
        if (res.ok) captions = await res.json();
      } catch(e) { console.error("Could not load captions.json"); }

      try {
        const response = await fetch(workerUrl);
        const files = await response.json();

        const photoGallery = document.getElementById('gallery');
        const videoGallery = document.getElementById('video-gallery');

        photoGallery.innerHTML = '';
        videoGallery.innerHTML = '';

        const usedInCarousel = new Set();

        // 1. PROCESS CAROUSELS
        Object.keys(captions).forEach(key => {
          const data = captions[key];
          if (data && data.type === "carousel" && data.images) {
            let slides = '';
            data.images.forEach((img, i) => {
              slides += `
                <img src="${bucketUrl}${img}" 
                     class="${i===0 ? 'active' : ''}" 
                     alt="${data.caption}"
                     onclick="openLightbox('${bucketUrl}${img}')">`;
              usedInCarousel.add(img);
            });

            const html = `
              <div class="carousel-item">
                <div class="carousel" data-index="0">
                  ${slides}
                  <button class="carousel-btn prev" onclick="prevSlide(this)">‹</button>
                  <button class="carousel-btn next" onclick="nextSlide(this)">›</button>
                  <div class="carousel-dots"></div>
                </div>
                <div class="caption">${data.caption}</div>
              </div>`;
            photoGallery.innerHTML += html;
          }
        });

        // 2. PROCESS REMAINING IMAGES & VIDEOS
      files.reverse().forEach(filename => {
       if (filename.startsWith("thumbnails/") || filename.startsWith("site-assets/") || usedInCarousel.has(filename)) return;

          const isVideo = filename.match(/\.(mp4|MP4)$/i);
          const caption = captions[filename] || filename.replace(/\..+$/, '').replace(/[_-]/g, ' ');

          if (!isVideo) {
            // Single image
            const html = `
              <div class="item" onclick="openLightbox('${bucketUrl}${filename}')">
                <img src="${bucketUrl}${filename}" alt="${caption}">
                <div class="caption">${caption}</div>
              </div>`;
            photoGallery.innerHTML += html;
          } else {
            // Video
            const baseName = filename.replace(/\.(mp4|MP4)$/i, '');
            const thumbnail = bucketUrl + "thumbnails/" + baseName + ".jpg";
            const html = `
              <div class="item">
                <video controls poster="${thumbnail}">
                  <source src="${bucketUrl}${filename}" type="video/mp4">
                </video>
                <div class="caption">${caption}</div>
              </div>`;
            videoGallery.innerHTML += html;
          }
        });
      } catch (e) {
        console.error("Error loading media:", e);
      }
    }

    // Carousel Functions
    function prevSlide(btn) {
      const carousel = btn.parentElement;
      const images = carousel.querySelectorAll('img');
      let index = parseInt(carousel.dataset.index || 0);
      index = (index - 1 + images.length) % images.length;
      updateCarousel(carousel, index);
    }

    function nextSlide(btn) {
      const carousel = btn.parentElement;
      const images = carousel.querySelectorAll('img');
      let index = parseInt(carousel.dataset.index || 0);
      index = (index + 1) % images.length;
      updateCarousel(carousel, index);
    }

    function updateCarousel(carousel, index) {
      carousel.dataset.index = index;
      const images = carousel.querySelectorAll('img');
      images.forEach((img, i) => img.classList.toggle('active', i === index));

      const dotsContainer = carousel.querySelector('.carousel-dots');
      if (dotsContainer) {
        dotsContainer.innerHTML = '';
        images.forEach((_, i) => {
          const dot = document.createElement('span');
          dot.classList.toggle('active', i === index);
          dot.onclick = () => updateCarousel(carousel, i);
          dotsContainer.appendChild(dot);
        });
      }
    }

    function openLightbox(src) {
      document.getElementById('lightbox-image').src = src;
      document.getElementById('lightbox').style.display = 'flex';
    }

    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target.id === 'lightbox') this.style.display = 'none';
    });

    // Back to Top
    const backToTop = document.getElementById('back-to-top');
    window.addEventListener('scroll', () => {
      backToTop.style.display = (window.scrollY > 600) ? 'flex' : 'none';
    });
    backToTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    loadMedia();

    // Dark Mode Toggle
    const toggle = document.getElementById('theme-toggle');
    const currentTheme = localStorage.getItem('theme') || 'light';
    if (currentTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      toggle.textContent = '☀️';
    }
    toggle.addEventListener('click', () => {
      if (document.documentElement.getAttribute('data-theme') === 'dark') {
        document.documentElement.removeAttribute('data-theme');
        toggle.textContent = '🌙';
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        toggle.textContent = '☀️';
        localStorage.setItem('theme', 'dark');
      }
    });
  </script>
</body>
</html>
