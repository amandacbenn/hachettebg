<head>

  <!-- Favicon -->

  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192x192.png">
  <link rel="manifest" href="site.webmanifest">

  <style>
    :root { --bg: #f8f8f8; --text: #333; --secondary: #555; }
    [data-theme="dark"] { --bg: #1a1a1a; --text: #e0e0e0; --secondary: #aaa; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      text-align: center;
      transition: background 0.3s, color 0.3s;
    }

    /* === Your existing styles (hero, gallery, carousel, etc.) === */
    /* Hero Banner */
    .hero {
      position: relative;
      margin: -20px -20px 40px -20px;
      height: 65vh;
      min-height: 450px;
      background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)), 
                  url('https://pub-a61f2b08e4414067ba6d337c905d46c2.r2.dev/site-assets/IMG_2863.JPEG') center 30% / cover no-repeat;
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 10%;
      color: white;
      text-shadow: 0 3px 12px rgba(0,0,0,0.85);
    }

    .hero-content {
      text-align: left;
      max-width: 460px;
      color: #f4d03f;
      margin-left: 60px;
      margin-bottom: 60px;
    }

    @media (max-width: 768px) {
      .hero { background-attachment: scroll; background-position: 80% 15%; height: 45vh; justify-content: center; padding-left: 0; }
      .hero-content { margin: 0; text-align: center; }
    }

    .main-header { font-size: 2.4em; margin: 40px 0 30px 0; color: var(--text); }

    .section-header-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      max-width: 1600px;
      margin: 30px auto 25px;
      padding: 0 20px;
    }

    .section-header { font-size: 2.0em; margin: 0; color: var(--secondary); }

    .jump-menu a {
      padding: 8px 20px;
      background: #ff69b4;
      color: white;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      max-width: 1600px;
      margin: 0 auto 80px;
    }

    /* Carousel Styles */
    .carousel-item { position: relative; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .carousel { position: relative; }
    .carousel img { width: 100%; height: 100%; object-fit: cover; display: none; cursor: pointer; }
    .carousel img.active { display: block; }
    .carousel-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,0.6); color: white; border: none;
      width: 44px; height: 44px; border-radius: 50%; font-size: 1.5em; cursor: pointer; z-index: 10;
    }
    .carousel-btn.prev { left: 12px; }
    .carousel-btn.next { right: 12px; }
    .carousel-dots {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 6px; z-index: 10;
    }
    .carousel-dots span {
      width: 9px; height: 9px; background: rgba(255,255,255,0.6);
      border-radius: 50%; cursor: pointer;
    }
    .carousel-dots span.active { background: white; transform: scale(1.2); }

    .item {
      position: relative; border-radius: 12px; overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); cursor: pointer;
    }
    .item img, .item video { width: 100%; height: 100%; object-fit: cover; display: block; }

    .caption {
      position: absolute; top: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.45); backdrop-filter: blur(10px);
      color: white; padding: 15px 15px 20px; font-size: 1.05em;
      text-align: center; z-index: 5;
    }

    /* New Gallery Controls */
    .gallery-controls {
      max-width: 1600px;
      margin: 20px auto 30px;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      align-items: center;
    }
    #search-input {
      padding: 12px 20px;
      width: 320px;
      max-width: 100%;
      border: 2px solid #ff69b4;
      border-radius: 30px;
      font-size: 1.1em;
    }
    .random-btn {
      padding: 12px 26px;
      background: #ff69b4;
      color: white;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
    }
    .tag-filter {
      padding: 8px 18px;
      background: var(--secondary);
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.95em;
    }
    .tag-filter.active { background: #ff69b4; }

    #lightbox { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
    #lightbox img { max-width: 95%; max-height: 95vh; border-radius: 8px; }

    .back-to-top {
      position: fixed; bottom: 30px; right: 30px;
      background: rgba(0,0,0,0.75); color: white;
      width: 50px; height: 50px; border-radius: 50%;
      display: none; align-items: center; justify-content: center;
      font-size: 1.8em; z-index: 200; cursor: pointer;
    }

    .theme-toggle {
      position: fixed; top: 20px; right: 20px;
      background: none; border: none; font-size: 1.8em;
      cursor: pointer; z-index: 100;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="theme-toggle">🌙</button>
     
  <div class="hero">

      <a href="https://x.com/softblondesnack" target="_blank"><img src="xlogo.svg" width="28" height="28" alt="X"></a>
      <a href="https://onlyfans.com/softblondesnack" target="_blank"><img src="onlyfans.svg" width="28" height="28" alt="OnlyFans"></a>

    <div class="hero-content">
      <h1>Smart.<br>Sassy.</h1>

  <h2 class="main-header">Media Gallery</h2>

  <!-- New Controls -->
  <div class="gallery-controls">
    <input type="text" id="search-input" placeholder="Search captions...">

    <img id="lightbox-image" src="" alt="">
  </div>

  <script>
    const bucketUrl = "https://pub-a61f2b08e4414067ba6d337c905d46c2.r2.dev/";
    const workerUrl = "https://sparkling-rain-18fb.amandabennett-hbg.workers.dev/list";
    const captionsUrl = "captions.json";

    let allItems = [];

    async function loadMedia() {
      let captions = {};
      try {
        const res = await fetch(captionsUrl);
        if (res.ok) captions = await res.json();
      } catch(e) { console.error("Could not load captions.json"); }

      try {
        const response = await fetch(workerUrl);
        const files = await response.json();

        const photoGallery = document.getElementById('gallery');
        const videoGallery = document.getElementById('video-gallery');

        photoGallery.innerHTML = '';
        videoGallery.innerHTML = '';
        allItems = [];

        Object.keys(captions).forEach(key => {
          const data = captions[key];
          if (data && data.type === "carousel" && data.images) {
            allItems.push({type: "carousel", key, data});
          } else if (typeof data === "string") {
            allItems.push({type: "single", key, caption: data});
          }
        });

        renderGallery(allItems);
        generateTagFilters(allItems);

      } catch (e) {
        console.error("Error loading media:", e);
      }
    }

    function renderGallery(items) {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';

      items.forEach(item => {
        if (item.type === "carousel") {
          let slides = '';
          item.data.images.forEach((img, i) => {
            slides += `<img src="${bucketUrl}${img}" class="${i===0 ? 'active' : ''}" alt="${item.data.caption}" onclick="openLightbox('${bucketUrl}${img}')">`;
          });

          const html = `
            <div class="carousel-item">
              <div class="carousel" data-index="0">
                ${slides}
                <button class="carousel-btn prev" onclick="prevSlide(this)">‹</button>
                <button class="carousel-btn next" onclick="nextSlide(this)">›</button>
                <div class="carousel-dots"></div>
              </div>
              <div class="caption">${item.data.caption}</div>
            </div>`;
          gallery.innerHTML += html;
        } else {
          const html = `
            <div class="item" onclick="openLightbox('${bucketUrl}${item.key}')">
              <img src="${bucketUrl}${item.key}" alt="${item.caption}">
              <div class="caption">${item.caption}</div>
            </div>`;
          gallery.innerHTML += html;
        }
      });
    }

    // Search
    document.getElementById('search-input').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = allItems.filter(item => {
        const caption = item.type === "carousel" ? item.data.caption : item.caption;
        return caption.toLowerCase().includes(term);
      });
      renderGallery(filtered);
    });

    // Random
    function showRandomItem() {
      if (allItems.length === 0) return;
      const random = allItems[Math.floor(Math.random() * allItems.length)];
      if (random.type === "carousel") {
        openLightbox(bucketUrl + random.data.images[0]);
      } else {
        openLightbox(bucketUrl + random.key);
      }
    }

    // Tag Filters (basic version - you can expand later)
    function generateTagFilters(items) {
      // For now, just show a few example tags. We can make it dynamic later.
      document.getElementById('tag-filters').innerHTML = `
        <button class="tag-filter active" onclick="filterByTag(this)">All</button>
        <button class="tag-filter" onclick="filterByTag(this)">Outfit</button>
        <button class="tag-filter" onclick="filterByTag(this)">Lingerie</button>
      `;
    }

    function filterByTag(btn) {
      // Simple version for now
      document.querySelectorAll('.tag-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // Full filtering logic can be expanded later
      renderGallery(allItems);
    }

    // Carousel functions (prevSlide, nextSlide, updateCarousel) - kept from before
    function prevSlide(btn) { /* ... */ }
    function nextSlide(btn) { /* ... */ }
    function updateCarousel(carousel, index) { /* ... */ }

    function openLightbox(src) {
      document.getElementById('lightbox-image').src = src;
      document.getElementById('lightbox').style.display = 'flex';
    }

    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target.id === 'lightbox') this.style.display = 'none';
    });

    // Back to Top
    const backToTop = document.getElementById('back-to-top');
    window.addEventListener('scroll', () => {
      backToTop.style.display = (window.scrollY > 600) ? 'flex' : 'none';
    });
    backToTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    loadMedia();

    // Dark Mode Toggle
    const toggle = document.getElementById('theme-toggle');
    const currentTheme = localStorage.getItem('theme') || 'light';
    if (currentTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      toggle.textContent = '☀️';
    }
    toggle.addEventListener('click', () => {
      if (document.documentElement.getAttribute('data-theme') === 'dark') {
        document.documentElement.removeAttribute('data-theme');
        toggle.textContent = '🌙';
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        toggle.textContent = '☀️';
        localStorage.setItem('theme', 'dark');
      }
    });
  </script>
