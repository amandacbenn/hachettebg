<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hachette BG</title>
 
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192x192.png">
  <link rel="manifest" href="site.webmanifest">

  <style>
    :root {
      --bg: #f8f8f8;
      --text: #333;
      --secondary: #555;
    }
    [data-theme="dark"] {
      --bg: #1a1a1a;
      --text: #e0e0e0;
      --secondary: #aaa;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      text-align: center;
      transition: background 0.3s, color 0.3s;
    }
    h1 { margin: 30px 0 10px; font-size: 2.8em; }
    h2 { margin: 50px 0 20px; font-size: 2em; }
    p { font-size: 1.3em; color: var(--secondary); }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      max-width: 1600px;
      margin: 40px auto;
    }
    .photo {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .photo img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.4s;
    }
    .photo:hover img { transform: scale(1.06); }
    .caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      color: white;
      padding: 20px 15px 15px;
      font-size: 1.1em;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .photo:hover .caption { opacity: 1; }

    video {
      max-width: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin: 20px auto;
      display: block;
    }

    /* Dark Mode Toggle */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      font-size: 1.8em;
      cursor: pointer;
      z-index: 100;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="theme-toggle">🌙</button>

  <h1>Hachette BG</h1>
  <p>Photo Gallery</p>

  <div class="gallery" id="gallery"></div>

  <h2>Videos</h2>
  
  <video controls>
    <source src="marinbarspin.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
  <p>Marin Bar Spin</p>

  <p>More coming soon...</p>

  <script>
    const images = [
      { file: "linkedin1.jpg",     caption: "Professional Headshot" },
      { file: "pinkdream.jpg",     caption: "Pink Dream Set" },
      { file: "blueflowers.jpg",   caption: "Blue Floral Look" },
      { file: "flowerchemise.png", caption: "Floral Chemise" },
      { file: "marinbar.jpg",      caption: "Night at the Bar" },
      { file: "greenjammies.png",  caption: "Green Pajamas" },
      { file: "marinballet.jpg",   caption: "Marin Ballet" },
      { file: "readyrun.png",      caption: "Ready to Run" },
      { file: "IMG_2097.JPG",      caption: "Farmer's Market" },
      { file: "IMG_2102.JPG",      caption: "White Tee" }, 
      { file: "IMG_2108.JPG",      caption: "Backyard BBQ" },
      { file: "IMG_2112.JPEG",      caption: "Tube Top" },
      { file: "IMG_2115.JPG",      caption: "Pencil Skirt" },
      { file: "IMG_2118.JPG",      caption: "Wide Leg Jeans" },
      { file: "IMG_2121.JPG",      caption: "Fuck Me Boots" },
      { file: "IMG_2132.JPG",      caption: "Flora Nikrooz Chemise" }, 
      { file: "workoutbabe.jpg",   caption: "Baby Blue Workout" },
      { file: "realcatsuit.jpg",   caption: "Leather Kitty Cat" },
      { file: "japanreal.jpg",     caption: "Japanese School Girl" },
      { file: "skinny marin.jpg",  caption: "Rutgers Cheer Leader" },
      { file: "dadtrampwide.jpg",  caption: "Daddy Trampoline Wide" },
      { file: "yesdaddypink.jpg",  caption: "Yes Daddy Pink" },
      { file: "bangcancap.jpg",    caption: "Bang Me in the Can" },
      { file: "domecancap.jpg",    caption: "Do Me in the Can" },
      { file: "pompomchick.jpg",   caption: "Pom Pom Girl" },      
    ];

    const gallery = document.getElementById('gallery');
    images.forEach(img => {
      const html = `
        <a href="${img.file}" target="_blank" class="photo">
          <img src="${img.file}" alt="${img.caption}">
          <div class="caption">${img.caption}</div>
        </a>`;
      gallery.innerHTML += html;
    });

    // Dark Mode Toggle
    const toggle = document.getElementById('theme-toggle');
    const currentTheme = localStorage.getItem('theme') || 'light';

    if (currentTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      toggle.textContent = '☀️';
    }

    toggle.addEventListener('click', () => {
      if (document.documentElement.getAttribute('data-theme') === 'dark') {
        document.documentElement.removeAttribute('data-theme');
        toggle.textContent = '🌙';
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        toggle.textContent = '☀️';
        localStorage.setItem('theme', 'dark');
      }
    });
  </script>
</body>
</html>
