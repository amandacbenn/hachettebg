<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hachette BG</title>
 
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192x192.png">
  <link rel="manifest" href="site.webmanifest">

  <style>
    :root { --bg: #f8f8f8; --text: #333; --secondary: #555; }
    [data-theme="dark"] { --bg: #1a1a1a; --text: #e0e0e0; --secondary: #aaa; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      text-align: center;
      transition: background 0.3s, color 0.3s;
    }

    /* Hero Banner */
    .hero {
      position: relative;
      margin: -20px -20px 50px -20px;
      height: 490px;
      background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.55)), 
                  url('hero-banner.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 8%;
      color: white;
      text-shadow: 0 3px 12px rgba(0,0,0,0.9);
    }
    .hero-content {
      text-align: right;
      max-width: 420px;
    }
    .hero h1 {
      font-size: 3.1em;
      margin: 0 0 8px 0;
      line-height: 1.05;
      color: #ff69b4;
    }
    .hero p {
      font-size: 1.45em;
      margin: 0;
      opacity: 0.95;
    }

    /* Section Headers */
    .section-header {
      font-size: 2.2em;
      margin: 60px 0 30px 0;
      color: var(--text);
      text-align: center;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      max-width: 1600px;
      margin: 0 auto 60px;
    }
    .item {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .item img, .item video {
      width: 100%;
      height: auto;
      display: block;
    }
    .caption {
      position: absolute;
      top: 0; left: 0; right: 0;
      background: linear-gradient(rgba(0,0,0,0.75), transparent);
      color: white;
      padding: 15px 15px 20px;
      font-size: 1.1em;
      text-align: center;
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      font-size: 1.8em;
      cursor: pointer;
      z-index: 100;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="theme-toggle">🌙</button>

  <!-- Hero Banner -->
  <div class="hero">
    <div class="hero-content">
      <h1>Smart.<br>Sassy.</h1>
      <p>Sincerely Me.</p>
    </div>
  </div>

  <h2 class="section-header">Media Gallery</h2>

  <div class="gallery" id="gallery"></div>

  <h2 class="section-header">Videos</h2>
  <div class="gallery" id="video-gallery"></div>

  <p>More coming soon...</p>

  <script>
    const bucketUrl = "https://pub-a61f2b08e4414067ba6d337c905d46c2.r2.dev/";
    const workerUrl = "https://sparkling-rain-18fb.amandabennett-hbg.workers.dev/list";
    const captionsUrl = bucketUrl + "captions.json";

    async function loadMedia() {
      let captions = {};
      try {
        const capRes = await fetch(captionsUrl);
        if (capRes.ok) captions = await capRes.json();
      } catch(e) {}

      try {
        const response = await fetch(workerUrl);
        const files = await response.json();

        const photos = files.filter(f => f.match(/\.(jpg|jpeg|png|gif)$/i));
        const videos = files.filter(f => f.match(/\.mp4$/i));

        const photoGallery = document.getElementById('gallery');
        const videoGallery = document.getElementById('video-gallery');

        photoGallery.innerHTML = '';
        videoGallery.innerHTML = '';

        // Photos
        photos.reverse().forEach(filename => {
          const caption = captions[filename] || filename.replace(/\..+$/, '').replace(/[_-]/g, ' ');
          const html = `
            <a href="${bucketUrl}${filename}" target="_blank" class="item">
              <img src="${bucketUrl}${filename}" alt="${caption}">
              <div class="caption">${caption}</div>
            </a>`;
          photoGallery.innerHTML += html;
        });

        // Videos
        videos.reverse().forEach(filename => {
          const caption = captions[filename] || filename.replace(/\..+$/, '').replace(/[_-]/g, ' ');
          const html = `
            <div class="item">
              <video controls poster="${bucketUrl}${filename.replace('.mp4', '.jpg')}">
                <source src="${bucketUrl}${filename}" type="video/mp4">
              </video>
              <div class="caption">${caption}</div>
            </div>`;
          videoGallery.innerHTML += html;
        });
      } catch (e) {
        console.error("Error loading media:", e);
      }
    }

    loadMedia();

    // Dark Mode Toggle
    const toggle = document.getElementById('theme-toggle');
    const currentTheme = localStorage.getItem('theme') || 'light';
    if (currentTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      toggle.textContent = '☀️';
    }
    toggle.addEventListener('click', () => {
      if (document.documentElement.getAttribute('data-theme') === 'dark') {
        document.documentElement.removeAttribute('data-theme');
        toggle.textContent = '🌙';
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        toggle.textContent = '☀️';
        localStorage.setItem('theme', 'dark');
      }
    });
  </script>
</body>
</html>
