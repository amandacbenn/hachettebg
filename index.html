<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hachette BG</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192x192.png">
  <link rel="manifest" href="site.webmanifest">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f8f8f8;
      color: #333;
      text-align: center;
    }
    h1 { margin: 30px 0 10px; font-size: 2.8em; }
    p { font-size: 1.3em; color: #555; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      max-width: 1600px;
      margin: 40px auto;
    }
    .photo {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .photo img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.4s;
    }
    .photo:hover img { transform: scale(1.06); }
    .caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      color: white;
      padding: 20px 15px 15px;
      font-size: 1.1em;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .photo:hover .caption { opacity: 1; }
  </style>
</head>
<body>
  <h1>Hachette BG</h1>
  <p>Photo Gallery</p>

  <div class="gallery" id="gallery">
    <!-- New photos are added here -->
  </div>

  <p>More coming soon...</p>

  <script>
    const images = [
      { file: "linkedin1.jpg",     caption: "Professional Headshot" },
      { file: "pinkdream.jpg",     caption: "Pink Dream Set" },
      { file: "blueflowers.jpg",   caption: "Blue Floral Look" },
      { file: "flowerchemise.png", caption: "Floral Chemise" },
      { file: "marinbar.jpg",      caption: "Night at the Bar" },
      { file: "greenjammies.png",  caption: "Green Pajamas" },
      { file: "readyrun.png",      caption: "Ready to Run" },
      // Add new photos below this line (just copy the format):
      // { file: "newphoto.jpg", caption: "Your Caption Here" },
    ];

    const gallery = document.getElementById('gallery');
    images.forEach(img => {
      const html = `
        <a href="${img.file}" target="_blank" class="photo">
          <img src="${img.file}" alt="${img.caption}">
          <div class="caption">${img.caption}</div>
        </a>`;
      gallery.innerHTML += html;
    });
  </script>
</body>
</html>
