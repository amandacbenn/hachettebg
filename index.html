<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hachette BG</title>
 
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192x192.png">
  <link rel="manifest" href="site.webmanifest">

  <style>
    :root {
      --bg: #f8f8f8;
      --text: #333;
      --secondary: #555;
    }
    [data-theme="dark"] {
      --bg: #1a1a1a;
      --text: #e0e0e0;
      --secondary: #aaa;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      text-align: center;
      transition: background 0.3s, color 0.3s;
    }
    h1 { margin: 30px 0 10px; font-size: 2.8em; }
    p { font-size: 1.3em; color: var(--secondary); }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      max-width: 1600px;
      margin: 40px auto;
    }
    .item {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .item img, .item video {
      width: 100%;
      height: auto;
      display: block;
    }
    .caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      color: white;
      padding: 20px 15px 15px;
      font-size: 1.1em;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .item:hover .caption { opacity: 1; }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      font-size: 1.8em;
      cursor: pointer;
      z-index: 100;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="theme-toggle">🌙</button>

  <h1>Hachette BG</h1>
  <p>Photo & Video Gallery</p>

  <div class="gallery" id="gallery"></div>

  <p>More coming soon...</p>

<script>
  const bucketUrl = "https://pub-a61f2b08e4414067ba6d337c905d46c2.r2.dev/";
  const workerUrl = "https://sparkling-rain-18fb.amandabennett-hbg.workers.dev/list";

    async function loadMedia() {
      try {
        const response = await fetch(workerUrl);
        const files = await response.json();

        const gallery = document.getElementById('gallery');
        files.forEach(filename => {
          const isVideo = filename.toLowerCase().endsWith('.mp4');
          let html = '';

          if (isVideo) {
            html = `
              <div class="item">
                <video controls>
                  <source src="${bucketUrl}${filename}" type="video/mp4">
                </video>
                <div class="caption">${filename.replace(/\..+$/, '')}</div>
              </div>`;
          } else {
            html = `
              <a href="${bucketUrl}${filename}" target="_blank" class="item">
                <img src="${bucketUrl}${filename}" alt="${filename}">
                <div class="caption">${filename.replace(/\..+$/, '')}</div>
              </a>`;
          }
          gallery.innerHTML += html;
        });
      } catch (e) {
        console.error("Could not load media", e);
      }
    }

    loadMedia();

    // Dark Mode Toggle
    const toggle = document.getElementById('theme-toggle');
    const currentTheme = localStorage.getItem('theme') || 'light';
    if (currentTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      toggle.textContent = '☀️';
    }
    toggle.addEventListener('click', () => {
      if (document.documentElement.getAttribute('data-theme') === 'dark') {
        document.documentElement.removeAttribute('data-theme');
        toggle.textContent = '🌙';
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        toggle.textContent = '☀️';
        localStorage.setItem('theme', 'dark');
      }
    });
  </script>
</body>
</html>
